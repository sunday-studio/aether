basePath: /v1
definitions:
  db.Entry:
    properties:
      createdAt:
        type: string
      document:
        type: string
      id:
        type: string
      isArchived:
        type: boolean
      isDeleted:
        type: boolean
      isPinned:
        type: boolean
      tags:
        items:
          $ref: '#/definitions/db.Tag'
        type: array
      updatedAt:
        type: string
    type: object
  db.Tag:
    properties:
      createdAt:
        type: string
      id:
        type: string
      name:
        type: string
      updatedAt:
        type: string
    type: object
  handlers.CreateEntryPayload:
    properties:
      date:
        type: string
      document:
        type: string
      isArchived:
        type: boolean
      isDeleted:
        type: boolean
      isPinned:
        type: boolean
      tags:
        items:
          type: string
        type: array
    type: object
  tag.CreateTagPayload:
    properties:
      name:
        type: string
    type: object
info:
  contact: {}
  description: something, something to write in
  title: Aether API
  version: "1.0"
paths:
  /entry:
    get:
      description: Returns all non-deleted entries
      operationId: getEntries
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/db.Entry'
            type: array
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get all entries
      tags:
      - Entries
    post:
      consumes:
      - application/json
      description: Creates a new entry with optional tags
      operationId: createEntry
      parameters:
      - description: Entry payload
        in: body
        name: entry
        required: true
        schema:
          $ref: '#/definitions/handlers.CreateEntryPayload'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/db.Entry'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Create a new entry
      tags:
      - Entries
  /entry/{id}:
    delete:
      operationId: deleteEntry
      parameters:
      - description: Entry ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Delete an entry (soft delete)
      tags:
      - Entries
    get:
      description: Returns a single entry by its ID
      operationId: getEntryByID
      parameters:
      - description: Entry ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/db.Entry'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get entry by ID
      tags:
      - Entries
    put:
      consumes:
      - application/json
      operationId: updateEntry
      parameters:
      - description: Entry ID
        in: path
        name: id
        required: true
        type: string
      - description: Updated entry payload
        in: body
        name: entry
        required: true
        schema:
          $ref: '#/definitions/handlers.CreateEntryPayload'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/db.Entry'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Update an entry
      tags:
      - Entries
  /entry/{id}/tags:
    post:
      consumes:
      - application/json
      operationId: addTagsToEntry
      parameters:
      - description: Entry ID
        in: path
        name: id
        required: true
        type: string
      - description: List of tag names
        in: body
        name: tags
        required: true
        schema:
          items:
            type: string
          type: array
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/db.Entry'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Add tags to an entry
      tags:
      - Entries
  /tags:
    get:
      description: Returns all tags
      operationId: getAllTags
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/db.Tag'
            type: array
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get all tags
      tags:
      - Tags
    post:
      consumes:
      - application/json
      operationId: createTag
      parameters:
      - description: Tag payload
        in: body
        name: tag
        required: true
        schema:
          $ref: '#/definitions/tag.CreateTagPayload'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/db.Tag'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Create a new tag
      tags:
      - Tags
  /tags/bulk-create:
    post:
      consumes:
      - application/json
      operationId: bulkCreateTags
      parameters:
      - description: Tags payload
        in: body
        name: tags
        required: true
        schema:
          items:
            $ref: '#/definitions/tag.CreateTagPayload'
          type: array
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/db.Tag'
            type: array
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Bulk create tags
      tags:
      - Tags
swagger: "2.0"
