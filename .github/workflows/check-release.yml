name: Check Release

on:
  workflow_call:
    inputs:
      manual_version:
        description: 'Version when running release manually'
        required: false
        type: string
      manual_release_notes:
        description: 'Release notes when running release manually'
        required: false
        type: string
    outputs:
      should_release:
        value: ${{ jobs.check.outputs.should_release }}
      version:
        value: ${{ jobs.check.outputs.version }}
      release_notes:
        value: ${{ jobs.check.outputs.release_notes }}

jobs:
  check:
    name: Check if Release Needed
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.out.outputs.should_release }}
      version: ${{ steps.out.outputs.version }}
      release_notes: ${{ steps.out.outputs.release_notes }}
    
    steps:
      - name: Checkout code
        if: ${{ inputs.manual_version == '' || inputs.manual_release_notes == '' }}
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Get merged PR details
        if: ${{ inputs.manual_version == '' || inputs.manual_release_notes == '' }}
        id: get-pr
        uses: actions/github-script@v7
        with:
          script: |
            const commit = context.sha;
            
            const { data: prs } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: commit
            });
            
            const mergedPR = prs.find(pr => pr.merged_at);
            
            if (!mergedPR) {
              console.log('No merged PR found for this commit');
              return null;
            }
            
            console.log(`Found merged PR #${mergedPR.number}: ${mergedPR.title}`);
            
            return {
              number: mergedPR.number,
              body: mergedPR.body || '',
              title: mergedPR.title
            };
      
      - name: Extract release info from PR
        id: extract
        if: ${{ inputs.manual_version == '' || inputs.manual_release_notes == '' }}
        uses: actions/github-script@v7
        with:
          script: |
            const prData = ${{ steps.get-pr.outputs.result }};
            
            if (!prData) {
              core.setOutput('should_release', 'false');
              console.log('No PR data available');
              return;
            }
            
            const prBody = prData.body;
            // Match "## Release Notes" then "### Version: X.Y.Z" or "### Version: X.Y.Z-rc.N". Trailing HTML comment on version line is allowed.
            const releaseNotesRegex = /## Release Notes\s+### Version:\s*(\d+\.\d+\.\d+(?:-[a-zA-Z0-9.-]+)?)\s*(?:[^\n]*)?\n+([\s\S]+?)(?=\n## [A-Z]|\n---|\n```|<!-- End of release notes -->|$)/i;
            const match = prBody.match(releaseNotesRegex);
            
            if (!match) {
              core.setOutput('should_release', 'false');
              if (!/## Release Notes/i.test(prBody)) {
                console.log('No "## Release Notes" heading found in PR description');
              } else if (!/### Version:\s*\d+\.\d+\.\d+/.test(prBody)) {
                console.log('No "### Version: X.Y.Z" line found—use e.g. "### Version: 0.0.1" (replace placeholder with real version)');
              } else {
                console.log('No release notes section found in PR description');
              }
              return;
            }
            
            const version = match[1].trim();
            let releaseNotes = (match[2] || '').trim();
            
            releaseNotes = releaseNotes.replace(/<!--[\s\S]*?-->/g, '');
            releaseNotes = releaseNotes.trim();
            
            if (!releaseNotes || releaseNotes.length < 10) {
              core.setOutput('should_release', 'false');
              console.log('Release notes are empty or too short');
              return;
            }
            
            try {
              await github.rest.git.getRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `tags/v${version}`
              });
              
              core.setFailed(`Version v${version} already exists as a git tag!`);
              return;
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
            }
            
            core.setOutput('should_release', 'true');
            core.setOutput('version', version);
            core.setOutput('release_notes', releaseNotes);
            
            console.log(`Release detected: v${version}`);

      - name: Set release outputs
        id: out
        run: |
          if [ -n "${{ inputs.manual_version }}" ] && [ -n "${{ inputs.manual_release_notes }}" ]; then
            echo "should_release=true" >> $GITHUB_OUTPUT
            echo "version=${{ inputs.manual_version }}" >> $GITHUB_OUTPUT
            echo "release_notes<<RELEASE_NOTES_EOF" >> $GITHUB_OUTPUT
            cat << 'RELEASE_NOTES_INNER'
          ${{ inputs.manual_release_notes }}
          RELEASE_NOTES_INNER
            echo "RELEASE_NOTES_EOF" >> $GITHUB_OUTPUT
          else
            echo "should_release=${{ steps.extract.outputs.should_release }}" >> $GITHUB_OUTPUT
            echo "version=${{ steps.extract.outputs.version }}" >> $GITHUB_OUTPUT
            echo "release_notes<<RELEASE_NOTES_EOF" >> $GITHUB_OUTPUT
            echo "${{ steps.extract.outputs.release_notes }}" >> $GITHUB_OUTPUT
            echo "RELEASE_NOTES_EOF" >> $GITHUB_OUTPUT
          fi